<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="styles/instagram-login-page.css">
<link rel="icon" href="images/Instagram_icon.png" type="image/x-icon">
<link rel="stylesheet" href="styles/basic.css">
<meta name="viewport" content="width=device-width, initial-scale=0.6">



<title>Instagram</title>

</head>


<body style="background-color: #0A1317;">
   
<div class="main-div" >

         <div  style="background-color: black;height: 950px;">

         <div>
            <img src="images/insta_logo.png" class="logo" alt="">
         </div>
            <div>
                  <div>
                     <p class="text_1">See everyday moments from</p>
                     
                  </div>
                  <div>
                     <p class="your_text">your&nbsp</p>
                     <p class="color_text">close friends.</p>

                  </div>

                  <div class="input-div" >
                     <img class="image_1"  src="images/image.png" alt="">

                  </div>


            </div>
            
            </div>
            
            <div style="background-color: rgb(51, 51, 45);"></div>
            <div style="background-color: #0A1317;height: 900px;">
         
         <div class="content-div">
            <div class="logo-div input-div">
                     <img src="images/insta_logo.png"
                     alt="" class="insta-logo">
            </div> 
            <div class="login-text">
               <p class="login_to_instagram_text">&#10094 &nbsp Log in to Instagram</p>
            </div>    
                  

            <div class="input-div">
                  <input class="username input-username" 
                  id="username"
                  onkeydown="keydown(event);"            
                  type="text"
                  placeholder="Mobile number,username or email address">

            </div>
         
            <div
                  class="password-div input-div" >
                  <button class="show-button"
                  onclick="showpassword();">
                  <img id="show-img"
                  class="show-img" 
                  src="images/hide.png"             
                  alt=""
                  ></button>

                  <input type="password"
                  onkeydown="keydown(event);"
                  id="password"
                  class="password input-password"            
                  placeholder="Password">
                  <p class="incorrect-password"></p>
                  
            </div>
            <div >
                  
                     
               
                  <button onclick="incorrect();accountPage();colorchange()"
                  class="login_button"
                  id="loginButton"           
                  >Log in </button>

         
            </div>

            <div class="input-div">
            
                  <a href="forgot-password-page.html">
                     <button class="forgot_password_text">
                        Forgot Password ?</button>
                  </a> 
            </div>
            <div class="input-div">
            
                  <a href="facebook-login.html">
                     <button class="login_with_facebook_button">
                        Login with Facebook</button>
                     </a>         
            </div>
            <div class="input-div">
                  <a href="create-account-page.html">
                     <button class="create_new_account_button">
                        Create new account </button>
                  </a>         
            </div>

            
            </div>
            </div>
      


</div>


<div class="bottom-border"></div > 

<div class="contact-div">
   

   <div style="display: inline;">
      <p class="peras">Meta</p>
      <p class="peras">About</p>
      <p class="peras">Helo</p>
      <p class="peras">API</p>
      <p class="peras">Jobs</p>
      <p class="peras">Privacy</p>
      <p class="peras">Blog</p>
      <p class="peras">Terms</p>
      <p class="peras">Locations</p>
      <p class="peras">Instagram Lite</p>
      <p class="peras">Meta AI</p>
      <p class="peras">Threads</p>
      <p class="peras">Contact Uploading & Non-Users</p>
      <p class="peras">Meta Verified</p>
      
      
   </div>

 
</div>

<div class="contact-div" >

 

   <p class="peras">English &#8964</p>
   <p class="peras"> &#169 2026 Instagram From Meta</p>

 



</div>

<script src="js/profile-page.js"></script>






</body>


</html>
